# Add a new server block to bennetto-infra/nginx/conf.d/default.conf
# (or create a separate file nginx/conf.d/bookclub.conf)

server {
    listen 80;
    server_name bookclub.bennetto.com;

    location / {
        proxy_pass http://bookclub:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
