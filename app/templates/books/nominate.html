{% extends "base.html" %}
{% block title %}Nominate a book{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Nominate a book</h1>

<form method="post" action="/{{ club.slug }}/books/nominate/scrape" class="space-y-4 max-w-lg">
  <div>
    <label class="block text-sm font-medium mb-1" for="goodreads_url">Goodreads URL</label>
    <input id="goodreads_url" name="goodreads_url" type="url" required autofocus
      placeholder="https://www.goodreads.com/book/show/..."
      class="w-full border border-stone-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
    <p class="text-xs text-stone-500 mt-1">
      We'll fetch the title, author, and page count automatically.
    </p>
  </div>
  <button type="submit"
    class="bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded px-4 py-2 text-sm">
    Look up book
  </button>
</form>
{% endblock %}
