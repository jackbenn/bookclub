{% if approved %}
<button
  hx-post="/{{ club.slug }}/books/{{ book.id }}/withdraw"
  hx-target="closest [data-approval]"
  hx-swap="outerHTML"
  class="text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-800 border border-amber-300 hover:bg-amber-200 font-medium"
  data-approval>
  ✓ Reading
</button>
{% else %}
<button
  hx-post="/{{ club.slug }}/books/{{ book.id }}/approve"
  hx-target="closest [data-approval]"
  hx-swap="outerHTML"
  class="text-xs px-3 py-1 rounded-full bg-stone-100 text-stone-600 border border-stone-300 hover:bg-stone-200 font-medium"
  data-approval>
  + I'd read this
</button>
{% endif %}
