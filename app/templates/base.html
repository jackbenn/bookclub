<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ club.display_name }}{% endblock %} · Book Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

  {% set c = club.accent_color %}
  <nav class="bg-{{ c }}-800 text-{{ c }}-50 px-6 py-3 flex items-center gap-6">
    <a href="/{{ club.slug }}/" class="font-semibold text-lg hover:text-{{ c }}-200">
      {{ club.display_name }}
    </a>
    <a href="/{{ club.slug }}/books" class="hover:text-{{ c }}-200 text-sm opacity-90">Books</a>
    <a href="/{{ club.slug }}/results" class="hover:text-{{ c }}-200 text-sm opacity-90">Results</a>
    <a href="/{{ club.slug }}/members" class="hover:text-{{ c }}-200 text-sm opacity-90">Members</a>
    {% if user is defined and user and user.is_admin %}
    <a href="/{{ club.slug }}/admin" class="hover:text-{{ c }}-200 text-sm opacity-90">Admin</a>
    {% endif %}
    <span class="ml-auto text-sm text-stone-400">
      {% if user is defined and user %}
        {{ user.display_name }}
        · <a href="/{{ club.slug }}/auth/logout" class="hover:text-amber-300">Log out</a>
      {% endif %}
    </span>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
